name: Windows

on: 
  push:

  schedule:
    - cron: '0 0 11 * *'

  workflow_dispatch:

env:
  BUILD_TYPE: Release
  CMAKE_MODULE_PATH: ${{github.workspace}}/external
  OpenCV_DIR: ${{github.workspace}}/build/external/external/lib

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v6

    - name: Create Build Environment
      run: cmake -E make_directory ${{github.workspace}}/build

    - name: Create External Build Environment
      run: cmake -E make_directory ${{github.workspace}}/build/external

    - name: Configure External CMake
      shell: bash
      working-directory: ${{github.workspace}}/build/external
      run: cmake ../../external -DCMAKE_BUILD_TYPE=$BUILD_TYPE

    - name: Build External
      working-directory: ${{github.workspace}}/build/external
      shell: bash
      run: cmake --build . --config $BUILD_TYPE

    - name: Configure CMake    
      shell: bash
      working-directory: ${{github.workspace}}/build      
      run: cmake .. -DCMAKE_BUILD_TYPE=$BUILD_TYPE

    - name: Build
      working-directory: ${{github.workspace}}/build
      shell: bash
      run: cmake --build . --config $BUILD_TYPE

    - name: Test
      working-directory: ${{github.workspace}}/build
      shell: bash
      run: |
        # Locate the OpenCV install dir produced by the External build and add
        # its DLL bin folder to PATH so ctest can launch the test executable.
        echo "Listing external install tree to locate OpenCV DLLs:"
        find "${{github.workspace}}/build/external" -maxdepth 6 -type d -iname bin || true
        find "${{github.workspace}}/build/external" -maxdepth 8 -iname 'opencv_world*.dll' || true
        DLL_DIRS=$(find "${{github.workspace}}/build/external" -iname 'opencv_world*.dll' -printf '%h\n' | sort -u)
        for d in $DLL_DIRS; do
          export PATH="$(cygpath -u "$d"):$PATH"
        done
        echo "PATH=$PATH"
        ctest --output-on-failure -C $BUILD_TYPE
