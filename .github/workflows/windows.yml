name: Windows

on: 
  push:

  schedule:
    - cron: '0 0 11 * *'

  workflow_dispatch:

env:
  BUILD_TYPE: Release
  CMAKE_MODULE_PATH: ${{github.workspace}}/external
  OpenCV_DIR: ${{github.workspace}}/build/external/external/lib

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v6

    - name: Create Build Environment
      run: cmake -E make_directory ${{github.workspace}}/build

    - name: Create External Build Environment
      run: cmake -E make_directory ${{github.workspace}}/build/external

    - name: Configure External CMake
      shell: bash
      working-directory: ${{github.workspace}}/build/external
      run: cmake ../../external -DCMAKE_BUILD_TYPE=$BUILD_TYPE

    - name: Build External
      working-directory: ${{github.workspace}}/build/external
      shell: bash
      run: cmake --build . --config $BUILD_TYPE

    - name: Configure CMake    
      shell: bash
      working-directory: ${{github.workspace}}/build      
      run: cmake .. -DCMAKE_BUILD_TYPE=$BUILD_TYPE

    - name: Build
      working-directory: ${{github.workspace}}/build
      shell: bash
      run: cmake --build . --config $BUILD_TYPE

    - name: Test
      working-directory: ${{github.workspace}}/build
      shell: bash
      run: |
        # OpenCV is built with BUILD_LIST (no world module) so DLLs are named
        # opencv_<module><ver>.dll. Add every directory containing OpenCV DLLs
        # to PATH so ctest can launch the test executable.
        DLL_DIRS=$(find "${{github.workspace}}/build/external" -iname 'opencv_*.dll' -printf '%h\n' | sort -u)
        echo "OpenCV DLL directories:"
        echo "$DLL_DIRS"
        for d in $DLL_DIRS; do
          export PATH="$(cygpath -u "$d"):$PATH"
        done
        ctest --output-on-failure -C $BUILD_TYPE
